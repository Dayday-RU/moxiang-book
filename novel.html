<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说详情 - 墨香书屋</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">墨香<span>书屋</span></a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">首页</a>
                <a href="index.html#booklist">书库</a>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜小说/作者..." onkeydown="if(event.key==='Enter') searchAndJump()">
                    <button onclick="searchAndJump()">🔍</button>
                </div>
            </nav>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="main">
        <div class="container">
            <div class="novel-detail" id="novelDetail"></div>
        </div>

        <footer class="footer">
            <p id="footerText"></p>
        </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        var novelId = new URLSearchParams(window.location.search).get('id');
        if (novelId) {
            renderNovelDetail(novelId);
        } else {
            document.getElementById('novelDetail').innerHTML = '<div class="empty-state"><div class="icon">📖</div><div class="text">未找到小说</div></div>';
        }
    </script>
</body>
</html>
